<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videxa - AI Video Question Answering System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">Videxa</h1>
            <p class="subtitle">Ask Questions About Video Content</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="card upload-card">
                    <div class="upload-icon">🎬</div>
                    <h2 class="upload-title">Upload Video</h2>
                    <div class="upload-box" id="uploadBox">
                        <svg class="upload-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="upload-text">Drag and drop your video here or click to upload</p>
                        <p class="upload-subtext">MP4, WebM, or Ogg format</p>
                        <input type="file" id="videoInput" accept="video/*" hidden>
                    </div>
                    <div class="upload-status" id="uploadStatus"></div>
                    <div class="upload-status" id="healthStatus" style="margin-top: 8px; color: #8b92a3; font-size: 0.95rem;"></div>
                </div>
            </section>

            <!-- Question Section -->
            <section class="question-section">
                <div class="card question-card">
                    <h2 class="section-title">Ask a Question</h2>
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="questionInput" 
                            class="question-input" 
                            placeholder="What would you like to know about the video?"
                            disabled
                        >
                        <button id="askButton" class="ask-button" disabled>
                            <span class="button-text">Ask</span>
                            <span class="button-icon">→</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Answer Section -->
            <section class="answer-section" id="answerSection" style="display: none;">
                <div class="card answer-card">
                    <h2 class="section-title">Answer</h2>
                    
                    <!-- Loading Spinner -->
                    <div class="loading-spinner" id="loadingSpinner" style="display: none;">
                        <div class="spinner"></div>
                        <p class="loading-text">Analyzing video and generating answer...</p>
                    </div>

                    <!-- Answer Content -->
                    <div id="answerContent" class="answer-content"></div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Videxa. Powered by AI.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

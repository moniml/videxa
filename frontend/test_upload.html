<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #log { border: 1px solid #ccc; padding: 10px; min-height: 200px; background: #f5f5f5; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Upload Test</h1>
    <button id="uploadBtn">Upload Test File</button>
    <div id="status"></div>
    <div id="log"></div>

    <script>
        const log = (msg) => {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerText += `[${time}] ${msg}\n`;
            console.log(msg);
        };

        const upload = async () => {
            log('Starting upload test...');
            
            try {
                const blob = new Blob([new Uint8Array(1000)], { type: 'video/mp4' });
                const file = new File([blob], 'test.mp4', { type: 'video/mp4' });
                
                log(`File created: ${file.name} (${file.type}, ${file.size} bytes)`);
                
                const formData = new FormData();
                formData.append("video", file);
                
                log('Sending fetch request to http://127.0.0.1:5000/upload');
                
                const res = await fetch("http://127.0.0.1:5000/upload", {
                    method: "POST",
                    body: formData
                });
                
                log(`Response status: ${res.status}`);
                log(`Response headers: ${JSON.stringify([...res.headers.entries()])}`);
                
                const data = await res.json();
                log(`Response data: ${JSON.stringify(data)}`);
                
                if (!res.ok) {
                    throw new Error(data.error || "Upload failed");
                }
                
                log('✅ Upload successful!');
                document.getElementById('status').innerText = '✅ Upload successful!';
                
            } catch (err) {
                log(`❌ Error: ${err.message}`);
                log(`${err.stack}`);
                document.getElementById('status').innerText = '❌ Upload failed: ' + err.message;
            }
        };

        document.getElementById('uploadBtn').addEventListener('click', upload);
        log('Test page loaded');
    </script>
</body>
</html>
